name: Hydra alerts
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 * * * *' # Hourly

jobs:
  hydra-alerts-pre-setup:
    name: Hydra alerts pre-setup
    runs-on: ubuntu-latest
    outputs:
      do_hydra_checks: ${{ steps.pre-setup.outputs.do_hydra_checks }}
      nixos_unstable_small_rev: ${{ steps.pre-setup.outputs.nixos_unstable_small_rev }}
    steps:
      - name: Performing pre-setup
        id: pre-setup
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x

          PREVIOUS_RUN_ID="$(gh run list --repo thefossguy/hydra-alerts-action --workflow=hydra-alerts.yaml --limit 2 --json databaseId --jq '.[1].databaseId')"
          if [[ -n "${PREVIOUS_RUN_ID}" ]] then
              gh run download --repo thefossguy/hydra-alerts-action "${PREVIOUS_RUN_ID}" --name previous-job-info --dir $PWD
          else
              echo 'ERROR: Could not determine $PREVIOUS_RUN_ID for some reason'
              touch previous-job-info
          fi
          cat previous-job-info

          NIXOS_UNSTABLE_SMALL_REV="$(git ls-remote https://github.com/nixos/nixpkgs.git refs/heads/nixos-unstable-small)"
          if [[ -n "${NIXOS_UNSTABLE_SMALL_REV}" ]]; then
              echo "nixos_unstable_small_rev=${NIXOS_UNSTABLE_SMALL_REV}" >> "$GITHUB_OUTPUT"
              if grep -q ":${NIXOS_UNSTABLE_SMALL_REV}:true" previous-job-info; then
                  echo "do_hydra_checks=false" >> "$GITHUB_OUTPUT"
              else
                  echo "do_hydra_checks=true" >> "$GITHUB_OUTPUT"
              fi
          else
              echo "do_hydra_checks=true" >> "$GITHUB_OUTPUT"
              echo 'ERROR: Could not determine $NIXOS_UNSTABLE_SMALL_REV for some reason'
          fi

  hydra-alerts:
    name: Hydra alerts
    runs-on: ubuntu-latest
    needs: hydra-alerts-pre-setup
    if: needs.hydra-alerts-pre-setup.outputs.do_hydra_checks == 'true'
    permissions:
      id-token: "write"
      contents: "read"

    steps:
      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Running the CI
        run: |
          set -x
          nix shell --refresh \
              --file https://github.com/thefossguy/hydra-alerts/archive/master.tar.gz \
              --command main.py thefossguy

  hydra-alerts-aftermath:
    name: Hydra alerts aftermath
    runs-on: ubuntu-latest
    needs: hydra-alerts
    if: always()
    permissions:
      id-token: "write"
      contents: "read"

    steps:
      - name: Upload artifact determination
        continue-on-error: true
        run: |
          set -x
          HYDRA_ALERTS_STATUS=${{ needs.hydra-alerts.result }}
          echo "${HYDRA_ALERTS_STATUS}"
          touch previous-job-info
          if [[ "${HYDRA_ALERTS_STATUS}" == 'success' ]] || [[ "${HYDRA_ALERTS_STATUS}" == 'skipped' ]]; then
              echo ":${{ needs.hydra-alerts-pre-setup.outputs.nixos_unstable_small_rev }}:true" | tee previous-job-info
          elif [[ "${HYDRA_ALERTS_STATUS}" == 'failure' ]] || [[ "${HYDRA_ALERTS_STATUS}" == 'cancelled' ]]; then
              echo ":${{ needs.hydra-alerts-pre-setup.outputs.nixos_unstable_small_rev }}:false" | tee previous-job-info
          else
              echo '...'
              exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          path: previous-job-info
          name: previous-job-info
          if-no-files-found: error
          overwrite: true
          compression-level: 9
          retention-days: 1
